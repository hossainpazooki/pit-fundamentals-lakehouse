bundle:
  name: vantage

variables:
  source_dir:
    description: Volume path holding <quarter>/num.txt + sub.txt directories (unzipped SEC Financial Statement Data Sets)
  lake_root:
    description: Volume root under which bronze/silver/gold/quarantine/registry are written
  quarters:
    description: Comma-separated quarter list (the PIT_QUARTERS contract)
    default: "2026q1"
  dqx_data:
    description: Volume path holding sub.txt + num.txt for the DQX bronze pre-gate
    default: /Volumes/workspace/default/vantage/source/2026q1
  dqx_json_out:
    description: Volume path where the DQX gate writes its machine-readable JSON result
    default: /Volumes/workspace/default/vantage/dqx-verify/results/gate.json

# Serverless-only workspace (classic clusters rejected with INVALID_PARAMETER_VALUE).
# Serverless JAR tasks: Scala 2.13 jar compiled against Databricks Connect (environment
# version 4), config passed as KEY=VALUE task parameters (no env vars on serverless;
# AppConfig.loadFromArgs turns them into system properties HOCON resolves like env vars).
resources:
  jobs:
    vantage_pipeline:
      name: vantage-pipeline
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            # Serverless JAR tasks take the jar via environment java_dependencies, not
            # task libraries. Absolute volume path: the bundle does not rewrite local
            # paths here, so the jar is uploaded explicitly (databricks fs cp) after
            # every `sbt "++2.13.16 assembly"`.
            java_dependencies:
              - /Volumes/workspace/default/vantage/jars/vantage-assembly-0.1.0.jar
      tasks:
        - task_key: run_pipeline
          environment_key: default
          spark_jar_task:
            main_class_name: pit.Pipeline
            parameters:
              - PIT_SOURCE_DIR=${var.source_dir}
              - PIT_BRONZE_ROOT=${var.lake_root}/bronze
              - PIT_SILVER_ROOT=${var.lake_root}/silver
              - PIT_GOLD_ROOT=${var.lake_root}/gold
              - PIT_QUARANTINE_ROOT=${var.lake_root}/quarantine
              - PIT_REGISTRY_PATH=${var.lake_root}/registry
              - PIT_QUARTERS=${var.quarters}
        # Gold is a PURE REBUILD done once after all quarters land (never per
        # quarter) -- hence a separate task strictly after run_pipeline.
        - task_key: run_gold_rebuild
          depends_on:
            - task_key: run_pipeline
          environment_key: default
          spark_jar_task:
            main_class_name: pit.gold.GoldRebuild
            parameters:
              - PIT_SOURCE_DIR=${var.source_dir}
              - PIT_BRONZE_ROOT=${var.lake_root}/bronze
              - PIT_SILVER_ROOT=${var.lake_root}/silver
              - PIT_GOLD_ROOT=${var.lake_root}/gold
              - PIT_QUARANTINE_ROOT=${var.lake_root}/quarantine
              - PIT_REGISTRY_PATH=${var.lake_root}/registry
              - PIT_QUARTERS=${var.quarters}

    # DQX bronze pre-gate (scripts/dqx_bronze_gate.py, uploaded to the volume like
    # the jar). Separate job by design: generic profile checks on raw TSVs, never
    # part of the PIT pipeline's publish path. Exit semantics ARE the task status:
    # a red gate (exit 1) or an unevaluable halt (exit 2) fails the task -- that is
    # the fail-closed contract, not an error to engineer around.
    vantage_dqx_bronze_gate:
      name: vantage-dqx-bronze-gate
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - databricks-labs-dqx
      tasks:
        - task_key: run_dqx_gate
          environment_key: default
          spark_python_task:
            # Bundle-relative: DABs rewrites this to the synced workspace file.
            # A UC-volume absolute path here fails on serverless ("Cannot read the
            # python file ...") even though the same file is readable via the
            # files API -- unlike java_dependencies, which REQUIRE the volume path.
            python_file: scripts/dqx_bronze_gate.py
            parameters:
              - "--data"
              - ${var.dqx_data}
              - "--json"
              - ${var.dqx_json_out}

targets:
  dev:
    mode: development
    default: true
    workspace:
      # Serverless JAR tasks install libraries from UC volumes, not workspace files.
      artifact_path: /Volumes/workspace/default/vantage/artifacts/${workspace.current_user.short_name}
  prod:
    mode: production

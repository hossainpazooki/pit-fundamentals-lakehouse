bundle:
  name: vantage

variables:
  source_dir:
    description: DBFS/volume path holding <quarter>/num.txt + sub.txt directories (unzipped SEC Financial Statement Data Sets)
  lake_root:
    description: DBFS/volume root under which bronze/silver/gold/quarantine/registry are written
  quarters:
    description: Comma-separated quarter list (the PIT_QUARTERS contract)
    default: "2026q1"

resources:
  jobs:
    vantage_pipeline:
      name: vantage-pipeline
      job_clusters:
        - job_cluster_key: main
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5d.large
            num_workers: 2
            # The entrypoints read their config from PIT_* env vars (application.conf
            # substitutions); spark_env_vars is how they reach the driver's environment.
            # silver_sub derives from PIT_SILVER_ROOT in code (SilverSubStore.path).
            spark_env_vars:
              PIT_SOURCE_DIR: ${var.source_dir}
              PIT_BRONZE_ROOT: ${var.lake_root}/bronze
              PIT_SILVER_ROOT: ${var.lake_root}/silver
              PIT_GOLD_ROOT: ${var.lake_root}/gold
              PIT_QUARANTINE_ROOT: ${var.lake_root}/quarantine
              PIT_REGISTRY_PATH: ${var.lake_root}/registry
              PIT_QUARTERS: ${var.quarters}
      tasks:
        - task_key: run_pipeline
          job_cluster_key: main
          spark_jar_task:
            main_class_name: pit.Pipeline
            parameters: []
          libraries:
            - jar: ./target/scala-2.12/vantage-assembly-0.1.0.jar
        # Gold is a PURE REBUILD done once after all quarters land (never per
        # quarter) -- hence a separate task strictly after run_pipeline.
        - task_key: run_gold_rebuild
          depends_on:
            - task_key: run_pipeline
          job_cluster_key: main
          spark_jar_task:
            main_class_name: pit.gold.GoldRebuild
            parameters: []
          libraries:
            - jar: ./target/scala-2.12/vantage-assembly-0.1.0.jar

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production

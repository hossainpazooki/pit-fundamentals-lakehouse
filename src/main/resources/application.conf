pit {
  spark {
    app-name = "vantage"
    app-name = ${?PIT_APP_NAME}
    master = null
    master = ${?PIT_SPARK_MASTER}
  }
  paths {
    source-dir      = ${?PIT_SOURCE_DIR}
    bronze-root     = ${?PIT_BRONZE_ROOT}
    silver-root     = ${?PIT_SILVER_ROOT}
    gold-root       = ${?PIT_GOLD_ROOT}
    quarantine-root = ${?PIT_QUARANTINE_ROOT}
    registry-path   = ${?PIT_REGISTRY_PATH}
  }
  ingest {
    # Overridden by the PIT_QUARTERS env var (comma-separated), handled in AppConfig.load —
    # HOCON substitution would inject an env STRING where this schema needs a list.
    quarters = ["2023q1"]
  }
}
